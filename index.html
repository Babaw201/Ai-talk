<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI vs AI — Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #020c07; --panel: #071a0d; --border: #0d3a1a;
    --green: #00ff66; --green2: #00cc44; --green-dim: #004d1a;
    --red: #ff3355; --blue: #00ccff; --yellow: #ffcc00;
    --text: #b8ffcc; --text-dim: #3d8050;
    --glow: 0 0 10px #00ff6660, 0 0 30px #00ff6620;
    --glow-red: 0 0 10px #ff335560;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Share Tech Mono',monospace; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
  body::before { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px); pointer-events:none; z-index:9999; }

  header { display:flex; align-items:center; justify-content:space-between; padding:10px 20px; border-bottom:1px solid var(--border); background:var(--panel); flex-shrink:0; }
  .logo { font-family:'Orbitron',sans-serif; font-weight:900; font-size:18px; color:var(--green); text-shadow:var(--glow); letter-spacing:4px; }
  .logo span { color:var(--red); text-shadow:var(--glow-red); }
  .header-right { display:flex; align-items:center; gap:14px; }
  #user-info { font-size:11px; color:var(--text-dim); letter-spacing:1px; }
  #user-info.connected { color:var(--green); }
  #msg-counter { font-size:12px; color:var(--text-dim); padding:4px 10px; border:1px solid var(--border); border-radius:2px; display:none; }
  #msg-counter.warning { color:var(--yellow); border-color:var(--yellow); }
  #msg-counter.blocked { color:var(--red); border-color:var(--red); }
  .status-dot { width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:var(--glow); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  #auth-btn { background:none; border:1px solid var(--border); color:var(--text-dim); font-family:'Share Tech Mono',monospace; font-size:11px; padding:4px 12px; cursor:pointer; transition:all 0.2s; letter-spacing:1px; }
  #auth-btn:hover { border-color:var(--green); color:var(--green); }
  #auth-btn.connected { border-color:var(--yellow); color:var(--yellow); }

  /* SCREENS */
  #auth-screen { flex:1; display:flex; align-items:center; justify-content:center; }
  #chat-screen { flex:1; display:none; flex-direction:column; overflow:hidden; }

  /* AUTH */
  .auth-panel { background:var(--panel); border:1px solid var(--border); border-top:2px solid var(--green); padding:36px; width:400px; max-width:90vw; animation:slideIn 0.2s ease; }
  @keyframes slideIn { from{transform:translateY(-16px);opacity:0} to{transform:translateY(0);opacity:1} }
  .auth-panel h2 { font-family:'Orbitron',sans-serif; color:var(--green); font-size:13px; letter-spacing:3px; margin-bottom:6px; text-shadow:var(--glow); }
  .auth-panel p { color:var(--text-dim); font-size:11px; margin-bottom:24px; }
  .tabs { display:flex; margin-bottom:24px; }
  .tab-btn { flex:1; padding:8px; background:none; border:1px solid var(--border); color:var(--text-dim); font-family:'Share Tech Mono',monospace; font-size:11px; cursor:pointer; letter-spacing:1px; transition:all 0.2s; }
  .tab-btn.active { background:var(--green-dim); border-color:var(--green); color:var(--green); }
  .field { margin-bottom:16px; }
  .field label { display:block; font-size:10px; color:var(--text-dim); letter-spacing:2px; margin-bottom:6px; }
  .field input { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); font-family:'Share Tech Mono',monospace; font-size:13px; padding:8px 10px; outline:none; transition:border-color 0.2s; }
  .field input:focus { border-color:var(--green); }
  .auth-error { font-size:11px; min-height:16px; margin-bottom:12px; color:var(--red); }
  .auth-submit { width:100%; background:var(--green-dim); color:var(--green); border:1px solid var(--green); font-family:'Share Tech Mono',monospace; font-size:12px; padding:10px; cursor:pointer; letter-spacing:1px; text-transform:uppercase; transition:all 0.2s; }
  .auth-submit:hover { background:var(--green); color:#000; }

  /* CHAT */
  #chat-area { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px; scroll-behavior:smooth; }
  #chat-area::-webkit-scrollbar { width:4px; }
  #chat-area::-webkit-scrollbar-track { background:var(--bg); }
  #chat-area::-webkit-scrollbar-thumb { background:var(--green-dim); border-radius:2px; }
  .msg { display:flex; gap:12px; animation:fadeIn 0.3s ease; max-width:85%; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .msg.claude { align-self:flex-start; }
  .msg.gpt { align-self:flex-end; flex-direction:row-reverse; }
  .msg.system { align-self:center; max-width:100%; }
  .msg.user-msg { align-self:flex-end; flex-direction:row-reverse; }
  .avatar { width:34px; height:34px; border-radius:2px; display:flex; align-items:center; justify-content:center; font-family:'Orbitron',sans-serif; font-size:10px; font-weight:700; flex-shrink:0; letter-spacing:1px; }
  .avatar.claude-av { background:var(--green-dim); border:1px solid var(--green2); color:var(--green); }
  .avatar.gpt-av { background:#0a1a2a; border:1px solid var(--blue); color:var(--blue); }
  .avatar.user-av { background:#1a0e00; border:1px solid var(--yellow); color:var(--yellow); }
  .bubble { padding:10px 14px; border-radius:2px; font-size:13px; line-height:1.6; max-width:100%; }
  .claude .bubble { background:var(--panel); border:1px solid var(--border); border-left:2px solid var(--green); color:var(--text); }
  .gpt .bubble { background:#060d14; border:1px solid #0a2030; border-right:2px solid var(--blue); color:#a8d8f0; }
  .user-msg .bubble { background:#1a0e00; border:1px solid var(--yellow); border-right:2px solid var(--yellow); color:var(--yellow); }
  .system .bubble { background:transparent; border:1px dashed var(--text-dim); color:var(--text-dim); font-size:11px; text-align:center; padding:6px 16px; width:100%; }
  .sender-label { font-family:'Orbitron',sans-serif; font-size:9px; letter-spacing:2px; margin-bottom:4px; }
  .claude .sender-label { color:var(--green); }
  .gpt .sender-label { color:var(--blue); text-align:right; }
  .user-msg .sender-label { color:var(--yellow); text-align:right; }
  .typing-dots span { display:inline-block; width:6px; height:6px; border-radius:50%; margin:0 2px; animation:blink 1.2s infinite; }
  .typing-dots span:nth-child(2){animation-delay:0.2s} .typing-dots span:nth-child(3){animation-delay:0.4s}
  .claude .typing-dots span { background:var(--green); }
  .gpt .typing-dots span { background:var(--blue); }
  @keyframes blink { 0%,80%,100%{opacity:0.15} 40%{opacity:1} }

  #bottom-bar { flex-shrink:0; border-top:1px solid var(--border); background:var(--panel); padding:12px 20px; display:flex; gap:10px; align-items:center; }
  #user-input { flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text); font-family:'Share Tech Mono',monospace; font-size:13px; padding:8px 12px; outline:none; transition:border-color 0.2s; }
  #user-input::placeholder { color:var(--text-dim); font-size:12px; }
  #user-input:focus { border-color:var(--green); }
  #user-input:disabled { opacity:0.4; cursor:not-allowed; }
  #send-btn { background:var(--green-dim); color:var(--green); border:1px solid var(--green); font-family:'Share Tech Mono',monospace; font-size:12px; padding:8px 18px; cursor:pointer; letter-spacing:1px; transition:all 0.2s; text-transform:uppercase; }
  #send-btn:hover:not(:disabled) { background:var(--green); color:#000; }
  #send-btn:disabled { opacity:0.4; cursor:not-allowed; }
  #limit-wall { display:none; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:16px; text-align:center; border-top:1px solid var(--red); background:#0a0003; flex-shrink:0; }
  #limit-wall p { color:var(--red); font-size:13px; letter-spacing:1px; }
  #limit-wall small { color:var(--text-dim); font-size:11px; }
</style>
</head>
<body>

<header>
  <div class="logo">AI <span>VS</span> AI</div>
  <div class="header-right">
    <div id="user-info">NON CONNECTÉ</div>
    <div id="msg-counter">MSG : 0 / 5</div>
    <div class="status-dot"></div>
    <button id="auth-btn" onclick="handleAuthBtn()">[ CONNEXION ]</button>
  </div>
</header>

<div id="auth-screen">
  <div class="auth-panel">
    <h2>// ACCÈS TERMINAL</h2>
    <p>Connectez-vous pour débattre avec les AIs</p>
    <div class="tabs">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">CONNEXION</button>
      <button class="tab-btn" id="tab-register" onclick="switchTab('register')">INSCRIPTION</button>
    </div>
    <div class="field">
      <label>EMAIL</label>
      <input type="email" id="auth-email" placeholder="votre@email.com" />
    </div>
    <div class="field">
      <label>MOT DE PASSE</label>
      <input type="password" id="auth-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')submitAuth()" />
    </div>
    <div class="auth-error" id="auth-error"></div>
    <button class="auth-submit" id="auth-submit-btn" onclick="submitAuth()">SE CONNECTER</button>
  </div>
</div>

<div id="chat-screen">
  <div id="chat-area">
    <div class="msg system"><div class="bubble">— TERMINAL PRÊT — Posez votre question aux deux AIs —</div></div>
  </div>
  <div id="limit-wall">
    <p>⛔ LIMITE ATTEINTE — 5 messages/jour</p>
    <small>Revenez demain pour continuer.</small>
  </div>
  <div id="bottom-bar">
    <input id="user-input" type="text" placeholder="Posez une question aux deux AIs..." />
    <button id="send-btn" onclick="sendMessage()">Envoyer ▶</button>
  </div>
</div>

<script>
  const WORKER = "https://ai-talk-proxy.baptiste-werner.workers.dev";
  const ADMIN = "admin@ai-terminal.io";

  let currentUser = null;
  let msgCount = 0;
  let isWaiting = false;
  let history = [];
  let tab = 'login';

  const chatArea = document.getElementById('chat-area');
  const counter = document.getElementById('msg-counter');
  const bottomBar = document.getElementById('bottom-bar');
  const limitWall = document.getElementById('limit-wall');

  function switchTab(t) {
    tab = t;
    document.getElementById('auth-error').textContent = '';
    document.getElementById('auth-error').style.color = 'var(--red)';
    document.getElementById('tab-login').className = 'tab-btn' + (t==='login'?' active':'');
    document.getElementById('tab-register').className = 'tab-btn' + (t==='register'?' active':'');
    document.getElementById('auth-submit-btn').textContent = t==='login' ? 'SE CONNECTER' : "S'INSCRIRE";
  }

  async function submitAuth() {
    const email = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;
    const errEl = document.getElementById('auth-error');
    errEl.style.color = 'var(--red)';
    errEl.textContent = '';
    if (!email || !password) { errEl.textContent = '⚠ Remplissez tous les champs'; return; }
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) { errEl.textContent = '⚠ Email invalide (ex: vous@gmail.com)'; return; }
    if (tab === 'register' && password.length < 6) { errEl.textContent = '⚠ Mot de passe trop court (6 car. min)'; return; }
    try {
      const res = await fetch(WORKER + (tab==='login'?'/login':'/register'), {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({email, password})
      });
      const data = await res.json();
      if (data.error) { errEl.textContent = '⚠ ' + data.error; return; }
      if (tab === 'register') {
        errEl.style.color = 'var(--green)';
        errEl.textContent = '✓ Compte créé ! Connexion en cours...';
        await new Promise(r => setTimeout(r, 900));
      }
      loginSuccess(email);
    } catch(e) { errEl.textContent = '⚠ Erreur réseau'; }
  }

  function loginSuccess(email) {
    currentUser = email;
    const isAdmin = email.toLowerCase() === ADMIN;
    document.getElementById('user-info').textContent = isAdmin ? '[ ROOT ] ' + email : email;
    document.getElementById('user-info').className = 'connected';
    document.getElementById('auth-btn').textContent = '[ DÉCO ]';
    document.getElementById('auth-btn').className = 'connected';
    counter.style.display = 'block';
    updateCounter();
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('chat-screen').style.display = 'flex';
    document.getElementById('user-input').focus();
  }

  function handleAuthBtn() {
    if (!currentUser) return;
    currentUser = null; msgCount = 0; history = [];
    document.getElementById('user-info').textContent = 'NON CONNECTÉ';
    document.getElementById('user-info').className = '';
    document.getElementById('auth-btn').textContent = '[ CONNEXION ]';
    document.getElementById('auth-btn').className = '';
    counter.style.display = 'none';
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('chat-screen').style.display = 'none';
    limitWall.style.display = 'none';
    bottomBar.style.display = 'flex';
    document.getElementById('auth-email').value = '';
    document.getElementById('auth-password').value = '';
    document.getElementById('auth-error').textContent = '';
  }

  function updateCounter() {
    if (!currentUser) return;
    const isAdmin = currentUser.toLowerCase() === ADMIN;
    counter.textContent = 'MSG : ' + msgCount + ' / ' + (isAdmin ? '∞' : '5');
    counter.className = isAdmin ? '' : (msgCount >= 5 ? 'blocked' : msgCount >= 4 ? 'warning' : '');
  }

  function esc(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function addSys(text) {
    const d = document.createElement('div');
    d.className = 'msg system';
    d.innerHTML = '<div class="bubble">' + text + '</div>';
    chatArea.appendChild(d); chatArea.scrollTop = chatArea.scrollHeight;
  }

  function addMsg(type, label, avatarClass, avatarText, text, alignRight) {
    const d = document.createElement('div');
    d.className = 'msg ' + type;
    d.innerHTML = '<div class="avatar ' + avatarClass + '">' + avatarText + '</div><div><div class="sender-label">' + label + '</div><div class="bubble">' + esc(text) + '</div></div>';
    chatArea.appendChild(d); chatArea.scrollTop = chatArea.scrollHeight;
  }

  function addTyping(type) {
    const d = document.createElement('div');
    d.className = 'msg ' + type; d.id = 'typing-' + type;
    const isLeft = type === 'claude';
    d.innerHTML = '<div class="avatar ' + (isLeft?'claude-av':'gpt-av') + '">' + (isLeft?'CLD':'GPT') + '</div><div><div class="sender-label">' + (isLeft?'CLAUDE':'GPT-4o') + '</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>';
    chatArea.appendChild(d); chatArea.scrollTop = chatArea.scrollHeight;
  }

  function removeTyping() {
    ['gpt','claude'].forEach(t => { const el = document.getElementById('typing-'+t); if(el) el.remove(); });
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text || isWaiting || !currentUser) return;
    const isAdmin = currentUser.toLowerCase() === ADMIN;
    if (!isAdmin && msgCount >= 5) { limitWall.style.display='flex'; bottomBar.style.display='none'; return; }

    input.value = ''; isWaiting = true;
    input.disabled = true; document.getElementById('send-btn').disabled = true;

    addMsg('user-msg', 'VOUS', 'user-av', 'YOU', text);
    history.push({role:'user', content: text});

    addTyping('gpt'); addTyping('claude');

    try {
      const res = await fetch(WORKER + '/chat', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ messages: history.slice(-8), email: currentUser })
      });
      const data = await res.json();
      removeTyping();

      if (data.error) {
        if (data.error.includes('5 messages')) { limitWall.style.display='flex'; bottomBar.style.display='none'; }
        else addSys('⚠ ' + data.error);
      } else {
        addMsg('gpt', 'GPT-4o', 'gpt-av', 'GPT', data.gpt);
        await new Promise(r => setTimeout(r, 500));
        addMsg('claude', 'CLAUDE', 'claude-av', 'CLD', data.claude);
        history.push({role:'assistant', content:'GPT: ' + data.gpt + '\nClaude: ' + data.claude});
        msgCount++;
        updateCounter();
        if (!isAdmin && msgCount >= 5) {
          await new Promise(r => setTimeout(r, 600));
          limitWall.style.display='flex'; bottomBar.style.display='none';
        }
      }
    } catch(e) { removeTyping(); addSys('⚠ Erreur réseau : ' + e.message); }

    isWaiting = false;
    input.disabled = false; document.getElementById('send-btn').disabled = false;
    input.focus();
  }

  document.getElementById('user-input').addEventListener('keydown', e => { if(e.key==='Enter') sendMessage(); });
</script>
</body>
</html>
