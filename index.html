<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Double Mind — GPT vs Claude</title>
<link rel="icon" type="image/png" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#050508;
    --panel:#0c0c14;
    --border:#1a1a2e;
    --blue:#4a9eff;
    --blue-dim:#0d1f3a;
    --orange:#ff8c2a;
    --orange-dim:#2a1400;
    --white:#e8e8f0;
    --muted:#4a4a6a;
    --red:#ff4466;
    --glow-blue:0 0 12px #4a9eff50;
    --glow-orange:0 0 12px #ff8c2a50;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { background:var(--bg); color:var(--white); font-family:'Inter',sans-serif; height:100%; width:100%; overflow:hidden; }
  #app { display:flex; flex-direction:column; height:100dvh; width:100%; overflow:hidden; }

  /* Scanlines subtiles */
  body::before { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.04) 3px,rgba(0,0,0,.04) 4px); pointer-events:none; z-index:9999; }

  /* ── HEADER ── */
  header {
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 14px; border-bottom:1px solid var(--border);
    background:var(--panel); flex-shrink:0; min-height:50px;
  }
  .logo-area { display:flex; align-items:center; gap:10px; }
  .logo-img { height:32px; width:32px; border-radius:6px; object-fit:cover; }
  .logo-text { font-family:'Orbitron',sans-serif; font-weight:900; font-size:15px; letter-spacing:2px; }
  .logo-text .blue { color:var(--blue); }
  .logo-text .orange { color:var(--orange); }
  .logo-text .white { color:var(--white); }
  .header-right { display:flex; align-items:center; gap:8px; flex-shrink:0; }
  #msg-counter { font-size:10px; color:var(--muted); padding:3px 8px; border:1px solid var(--border); border-radius:4px; display:none; white-space:nowrap; font-weight:500; }
  #msg-counter.warning { color:#ffaa44; border-color:#ffaa44; }
  #msg-counter.blocked { color:var(--red); border-color:var(--red); }
  .status-dot { width:7px; height:7px; border-radius:50%; background:#44ff88; animation:pulse 2s infinite; flex-shrink:0; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  #auth-btn { background:none; border:1px solid var(--border); color:var(--muted); font-family:'Inter',sans-serif; font-size:11px; font-weight:500; padding:5px 12px; cursor:pointer; transition:all .2s; border-radius:4px; white-space:nowrap; letter-spacing:.5px; }
  #auth-btn:hover { border-color:var(--blue); color:var(--blue); }
  #auth-btn.connected { border-color:var(--red); color:var(--red); }

  /* ── AUTH SCREEN ── */
  #auth-screen { flex:1; display:flex; align-items:center; justify-content:center; padding:16px; overflow-y:auto; }
  .auth-panel { background:var(--panel); border:1px solid var(--border); border-top:2px solid var(--blue); padding:28px 24px; width:100%; max-width:400px; border-radius:0 0 8px 8px; animation:slideIn .25s ease; }
  @keyframes slideIn { from{transform:translateY(-10px);opacity:0} to{transform:translateY(0);opacity:1} }

  .auth-logo { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:6px; }
  .auth-logo img { height:40px; border-radius:8px; }
  .auth-logo-text { font-family:'Orbitron',sans-serif; font-weight:900; font-size:18px; }

  .auth-panel p { color:var(--muted); font-size:12px; margin-bottom:22px; text-align:center; }
  .tabs { display:flex; margin-bottom:20px; gap:6px; }
  .tab-btn { flex:1; padding:8px; background:none; border:1px solid var(--border); color:var(--muted); font-family:'Inter',sans-serif; font-size:12px; font-weight:500; cursor:pointer; border-radius:4px; transition:all .2s; }
  .tab-btn.active { background:var(--blue-dim); border-color:var(--blue); color:var(--blue); }
  .field { margin-bottom:14px; }
  .field label { display:block; font-size:10px; color:var(--muted); letter-spacing:1.5px; margin-bottom:5px; text-transform:uppercase; font-weight:500; }
  .field input { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--white); font-family:'Inter',sans-serif; font-size:15px; padding:10px 12px; outline:none; transition:border-color .2s; -webkit-appearance:none; border-radius:4px; }
  .field input:focus { border-color:var(--blue); }
  .auth-error { font-size:11px; min-height:16px; margin-bottom:12px; color:var(--red); }
  .auth-submit { width:100%; background:var(--blue); color:#000; border:none; font-family:'Inter',sans-serif; font-size:13px; font-weight:700; padding:12px; cursor:pointer; border-radius:4px; transition:all .2s; letter-spacing:.5px; text-transform:uppercase; }
  .auth-submit:active { opacity:.85; }
  .auth-submit:disabled { opacity:.4; cursor:not-allowed; }

  /* ── CHAT SCREEN ── */
  #chat-screen { flex:1; display:none; flex-direction:column; overflow:hidden; }
  #chat-area { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:12px; scroll-behavior:smooth; overscroll-behavior:contain; }
  #chat-area::-webkit-scrollbar { width:3px; }
  #chat-area::-webkit-scrollbar-track { background:var(--bg); }
  #chat-area::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .msg { display:flex; gap:8px; animation:fadeIn .3s ease; max-width:88%; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  .msg.claude { align-self:flex-start; }
  .msg.gpt { align-self:flex-end; flex-direction:row-reverse; }
  .msg.user-msg { align-self:flex-end; flex-direction:row-reverse; }
  .msg.system { align-self:center; max-width:100%; }

  .avatar { width:32px; height:32px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-family:'Orbitron',sans-serif; font-size:8px; font-weight:700; flex-shrink:0; letter-spacing:1px; }
  .avatar.claude-av { background:var(--orange-dim); border:1px solid var(--orange); color:var(--orange); }
  .avatar.gpt-av { background:var(--blue-dim); border:1px solid var(--blue); color:var(--blue); }
  .avatar.user-av { background:#1a1a2e; border:1px solid #6666aa; color:#9999cc; }

  .bubble { padding:10px 14px; border-radius:6px; font-size:13px; line-height:1.6; max-width:100%; word-break:break-word; }
  .claude .bubble { background:#160e02; border:1px solid #2a1800; border-left:2px solid var(--orange); color:#ffe0b8; }
  .gpt .bubble { background:#020d1a; border:1px solid #0a1f30; border-right:2px solid var(--blue); color:#b8d8ff; }
  .user-msg .bubble { background:#0a0a1a; border:1px solid #2a2a4a; color:#c0c0e0; }
  .system .bubble { background:transparent; border:1px dashed var(--border); color:var(--muted); font-size:11px; text-align:center; padding:6px 14px; width:100%; border-radius:4px; }

  .sender-label { font-size:9px; letter-spacing:1.5px; margin-bottom:3px; font-weight:600; text-transform:uppercase; }
  .claude .sender-label { color:var(--orange); }
  .gpt .sender-label { color:var(--blue); text-align:right; }
  .user-msg .sender-label { color:#6666aa; text-align:right; }

  .typing-dots span { display:inline-block; width:5px; height:5px; border-radius:50%; margin:0 2px; animation:blink 1.2s infinite; }
  .typing-dots span:nth-child(2){animation-delay:.2s} .typing-dots span:nth-child(3){animation-delay:.4s}
  .claude .typing-dots span { background:var(--orange); }
  .gpt .typing-dots span { background:var(--blue); }
  @keyframes blink { 0%,80%,100%{opacity:.15} 40%{opacity:1} }

  /* ── BOTTOM BAR ── */
  #bottom-bar { flex-shrink:0; border-top:1px solid var(--border); background:var(--panel); padding:10px 12px; display:flex; gap:8px; align-items:center; }
  #user-input { flex:1; background:var(--bg); border:1px solid var(--border); color:var(--white); font-family:'Inter',sans-serif; font-size:15px; padding:10px 12px; outline:none; transition:border-color .2s; -webkit-appearance:none; border-radius:6px; min-width:0; }
  #user-input::placeholder { color:var(--muted); font-size:13px; }
  #user-input:focus { border-color:var(--blue); }
  #send-btn { background:var(--blue); color:#000; border:none; font-family:'Inter',sans-serif; font-size:13px; font-weight:700; padding:10px 16px; cursor:pointer; border-radius:6px; transition:all .2s; flex-shrink:0; white-space:nowrap; }
  #send-btn:active { opacity:.8; }
  #send-btn:disabled { opacity:.4; cursor:not-allowed; }

  /* ── MODE SELECTOR ── */
  #mode-bar {
    flex-shrink:0; border-bottom:1px solid var(--border);
    background:var(--panel); padding:8px 12px;
    display:none; gap:6px; align-items:center; overflow-x:auto;
    scrollbar-width:none;
  }
  #mode-bar::-webkit-scrollbar { display:none; }
  .mode-label { font-size:10px; color:var(--muted); font-weight:600; white-space:nowrap; letter-spacing:1px; flex-shrink:0; }
  .mode-btn {
    background:var(--bg); border:1px solid var(--border);
    color:var(--muted); font-family:'Inter',sans-serif;
    font-size:11px; font-weight:500; padding:5px 12px;
    cursor:pointer; border-radius:20px; transition:all .2s;
    white-space:nowrap; flex-shrink:0;
  }
  .mode-btn:hover { border-color:var(--blue); color:var(--blue); }
  .mode-btn.active { background:var(--blue); color:#000; border-color:var(--blue); font-weight:700; }
  .mode-btn.active.clash { background:var(--orange); border-color:var(--orange); }
  .mode-btn.active.creative { background:#a855f7; border-color:#a855f7; }
  .mode-btn.active.expert { background:#10b981; border-color:#10b981; }
  .mode-btn.active.debate { background:#f59e0b; border-color:#f59e0b; color:#000; }

  #limit-wall { display:none; flex-direction:column; align-items:center; justify-content:center; gap:8px; padding:16px; text-align:center; border-top:1px solid var(--red); background:#100008; flex-shrink:0; }
  #limit-wall p { color:var(--red); font-size:13px; font-weight:500; }
  #limit-wall small { color:var(--muted); font-size:11px; }
</style>
</head>
<body>
<div id="app">

<header>
  <div class="logo-area">
    <img src="logo.png" class="logo-img" alt="Double Mind" onerror="this.style.display='none'">
    <div class="logo-text">
      <span class="blue">Double</span> <span class="orange">Mind</span>
    </div>
  </div>
  <div class="header-right">
    <div id="msg-counter">0 / 5</div>
    <div class="status-dot"></div>
    <button id="auth-btn" onclick="handleAuthBtn()">Connexion</button>
  </div>
</header>

<div id="auth-screen">
  <div class="auth-panel">
    <div class="auth-logo">
      <img src="logo.png" alt="Double Mind" onerror="this.style.display='none'">
      <div class="logo-text auth-logo-text">
        <span class="blue">Double</span> <span class="orange">Mind</span>
      </div>
    </div>
    <p>Connectez-vous pour débattre avec GPT vs Claude</p>
    <div class="tabs">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Connexion</button>
      <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Inscription</button>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="votre@email.com" autocomplete="email" autocapitalize="none" />
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="auth-password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')submitAuth()" />
    </div>
    <div class="auth-error" id="auth-error"></div>
    <button class="auth-submit" id="auth-submit-btn" onclick="submitAuth()">Se connecter</button>
  </div>
</div>

<div id="chat-screen">
  <div id="mode-bar">
    <span class="mode-label">MODE :</span>
    <button class="mode-btn active" data-mode="classic" onclick="setMode(this)">🔵 Classique</button>
    <button class="mode-btn" data-mode="debate" onclick="setMode(this)">⚔️ Débat</button>
    <button class="mode-btn expert" data-mode="expert" onclick="setMode(this)">🧠 Expert</button>
    <button class="mode-btn creative" data-mode="creative" onclick="setMode(this)">🎨 Créatif</button>
    <button class="mode-btn clash" data-mode="clash" onclick="setMode(this)">🔥 Clash</button>
  </div>
  <div id="chat-area">
    <div class="msg system"><div class="bubble">— Posez votre question, GPT et Claude vont s'affronter —</div></div>
  </div>
  <div id="limit-wall">
    <p>⛔ Limite de 5 messages atteinte</p>
    <small>Revenez demain pour continuer.</small>
  </div>
  <div id="bottom-bar">
    <input id="user-input" type="search" inputmode="text" autocomplete="off" autocorrect="off" autocapitalize="sentences" spellcheck="true" placeholder="Posez une question aux deux AIs..." />
    <button id="send-btn" onclick="sendMessage()">▶</button>
  </div>
</div>

</div>
<script>
  const WORKER = "https://ai-talk-proxy.baptiste-werner.workers.dev";
  const ADMIN = "admin@ai-terminal.io";

  let currentUser = null, msgCount = 0, isWaiting = false, history = [], tab = 'login', currentMode = 'classic';

  function setMode(btn) {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    addSys('Mode : ' + btn.textContent);
  }

  const chatArea = document.getElementById('chat-area');
  const counter = document.getElementById('msg-counter');
  const bottomBar = document.getElementById('bottom-bar');
  const limitWall = document.getElementById('limit-wall');

  function switchTab(t) {
    tab = t;
    document.getElementById('auth-error').textContent = '';
    document.getElementById('tab-login').className = 'tab-btn'+(t==='login'?' active':'');
    document.getElementById('tab-register').className = 'tab-btn'+(t==='register'?' active':'');
    document.getElementById('auth-submit-btn').textContent = t==='login' ? 'Se connecter' : "S'inscrire";
  }

  async function submitAuth() {
    const email = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;
    const errEl = document.getElementById('auth-error');
    errEl.style.color = 'var(--red)'; errEl.textContent = '';
    if (!email || !password) { errEl.textContent = '⚠ Remplissez tous les champs'; return; }
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) { errEl.textContent = '⚠ Email invalide'; return; }
    if (tab==='register' && password.length < 6) { errEl.textContent = '⚠ Mot de passe trop court (6 car. min)'; return; }
    document.getElementById('auth-submit-btn').disabled = true;
    try {
      const res = await fetch(WORKER+(tab==='login'?'/login':'/register'), {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({email, password})
      });
      const data = await res.json();
      if (data.error) { errEl.textContent = '⚠ '+data.error; return; }
      if (tab==='register') {
        errEl.style.color = 'var(--blue)';
        errEl.textContent = '✓ Email de confirmation envoyé ! (valable 15 min)';
        document.getElementById('auth-submit-btn').disabled = false;
        return;
      }
      loginSuccess(email, data.msgsUsed || 0);
    } catch(e) { errEl.textContent = '⚠ Erreur réseau'; }
    document.getElementById('auth-submit-btn').disabled = false;
  }

  function loginSuccess(email, msgsUsed = 0) {
    currentUser = email; msgCount = msgsUsed;
    localStorage.setItem('dm_user', email);
    document.getElementById('auth-btn').textContent = 'Déconnexion';
    document.getElementById('auth-btn').className = 'connected';
    counter.style.display = 'block';
    updateCounter();
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('chat-screen').style.display = 'flex';
    document.getElementById('mode-bar').style.display = 'flex';
    setTimeout(() => document.getElementById('user-input').focus(), 100);
  }

  function handleAuthBtn() {
    if (!currentUser) return;
    currentUser = null; msgCount = 0; history = [];
    localStorage.removeItem('dm_user');
    document.getElementById('auth-btn').textContent = 'Connexion';
    document.getElementById('auth-btn').className = '';
    counter.style.display = 'none';
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('chat-screen').style.display = 'none';
    limitWall.style.display = 'none';
    bottomBar.style.display = 'flex';
    document.getElementById('mode-bar').style.display = 'none';
    document.getElementById('auth-email').value = '';
    document.getElementById('auth-password').value = '';
    document.getElementById('auth-error').textContent = '';
  }

  function updateCounter() {
    if (!currentUser) return;
    const isAdmin = currentUser.toLowerCase() === ADMIN;
    counter.textContent = msgCount+' / '+(isAdmin?'∞':'5');
    counter.className = isAdmin ? '' : (msgCount>=5?'blocked':msgCount>=4?'warning':'');
  }

  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function addSys(text) {
    const d = document.createElement('div');
    d.className = 'msg system';
    d.innerHTML = '<div class="bubble">'+text+'</div>';
    chatArea.appendChild(d); chatArea.scrollTop = chatArea.scrollHeight;
  }

  function addMsg(type, label, avClass, avText, text) {
    const d = document.createElement('div');
    d.className = 'msg '+type;
    d.innerHTML = '<div class="avatar '+avClass+'">'+avText+'</div><div><div class="sender-label">'+label+'</div><div class="bubble">'+esc(text)+'</div></div>';
    chatArea.appendChild(d); chatArea.scrollTop = chatArea.scrollHeight;
  }

  function addTyping(type) {
    const d = document.createElement('div');
    d.className = 'msg '+type; d.id = 'typing-'+type;
    const left = type==='claude';
    d.innerHTML = '<div class="avatar '+(left?'claude-av':'gpt-av')+'">'+(left?'CLD':'GPT')+'</div><div><div class="sender-label">'+(left?'Claude':'GPT-4o')+'</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>';
    chatArea.appendChild(d); chatArea.scrollTop = chatArea.scrollHeight;
  }

  function removeTyping() {
    ['gpt','claude'].forEach(t => { const el = document.getElementById('typing-'+t); if(el) el.remove(); });
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text || isWaiting || !currentUser) return;
    const isAdmin = currentUser.toLowerCase() === ADMIN;
    if (!isAdmin && msgCount >= 5) { limitWall.style.display='flex'; bottomBar.style.display='none'; return; }

    input.value = ''; isWaiting = true;
    input.disabled = true; document.getElementById('send-btn').disabled = true;

    addMsg('user-msg','Vous','user-av','YOU', text);
    history.push({role:'user', content:text});
    addTyping('gpt'); addTyping('claude');

    try {
      const res = await fetch(WORKER+'/chat', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({messages:history.slice(-8), email:currentUser, mode:currentMode})
      });
      const data = await res.json();
      removeTyping();
      if (data.error) {
        if (data.error.includes('5 messages')) { limitWall.style.display='flex'; bottomBar.style.display='none'; }
        else addSys('⚠ '+data.error);
      } else {
        addMsg('gpt','GPT-4o','gpt-av','GPT', data.gpt);
        await new Promise(r => setTimeout(r, 500));
        addMsg('claude','Claude','claude-av','CLD', data.claude);
        history.push({role:'assistant', content:'GPT: '+data.gpt+'\nClaude: '+data.claude});
        msgCount++; updateCounter();
        if (!isAdmin && msgCount >= 5) {
          await new Promise(r => setTimeout(r, 600));
          limitWall.style.display='flex'; bottomBar.style.display='none';
        }
      }
    } catch(e) { removeTyping(); addSys('⚠ Erreur réseau : '+e.message); }

    isWaiting = false;
    input.disabled = false; document.getElementById('send-btn').disabled = false;
    input.focus();
  }

  document.getElementById('user-input').addEventListener('keydown', e => { if(e.key==='Enter') sendMessage(); });

  // Restaurer la session au chargement
  (async function restoreSession() {
    const savedEmail = localStorage.getItem('dm_user');
    if (!savedEmail) return;
    try {
      const res = await fetch(WORKER + '/login-check', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: savedEmail })
      });
      const data = await res.json();
      if (data.success) {
        loginSuccess(savedEmail, data.msgsUsed || 0);
      } else {
        localStorage.removeItem('dm_user');
      }
    } catch(e) { localStorage.removeItem('dm_user'); }
  })();
</script>
</body>
</html>
