<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI·TALK</title>
<link href="https://fonts.googleapis.com/css2?family=Styrene+A:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#1a1a1a;
  --surface:#242424;
  --surface2:#2e2e2e;
  --border:#333;
  --text:#ececec;
  --muted:#888;
  --subtle:#555;
  --gpt:#4ade80;
  --claude:#f97316;
  --user:#a78bfa;
  --red:#f87171;
  --sans:'Inter',sans-serif;
  --radius:18px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden;font-size:15px;}

#app{display:flex;flex-direction:column;height:100vh;max-width:800px;margin:0 auto;}

/* ── HEADER compact ── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 24px;border-bottom:1px solid var(--border);
  flex-shrink:0;gap:12px;
}
.brand{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-0.3px;}
.brand em{font-style:normal;color:var(--user);}
.header-center{display:flex;gap:6px;}
.chip{display:flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:500;border:1px solid var(--border);color:var(--muted);background:var(--surface);}
.chip .dot{width:5px;height:5px;border-radius:50%;animation:pulse 2s infinite;}
.chip.gpt .dot{background:var(--gpt);}
.chip.claude .dot{background:var(--claude);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.header-right{display:flex;align-items:center;gap:8px;}

/* API + ROLES collapsed */
#topbar{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  padding:8px 24px;border-bottom:1px solid var(--border);
  background:var(--surface);flex-shrink:0;
}
#apiKeyInput{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:6px 12px;color:var(--text);
  font-family:var(--sans);font-size:13px;outline:none;
  width:260px;transition:border-color .2s;
}
#apiKeyInput:focus{border-color:var(--user);}
#apiKeyInput::placeholder{color:var(--subtle);}
#keyStatus{font-size:12px;font-weight:500;color:var(--muted);}
.sel{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;color:var(--text);font-family:var(--sans);
  font-size:12px;padding:5px 10px;outline:none;cursor:pointer;
}
.sel.gpt-sel{color:var(--gpt);}
.sel.claude-sel{color:var(--claude);}
.role-flash{font-size:11px;color:var(--user);display:none;}
.btn{font-family:var(--sans);font-size:12px;font-weight:500;padding:5px 12px;border-radius:8px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s;}
.btn:hover{color:var(--text);border-color:var(--subtle);}
.btn.danger{color:var(--red);border-color:rgba(248,113,113,.3);}
.btn.danger:hover{background:rgba(248,113,113,.08);}

/* STATUS */
#statusBar{
  padding:4px 24px;font-size:12px;color:var(--muted);
  border-bottom:1px solid var(--border);flex-shrink:0;
  display:flex;align-items:center;gap:7px;min-height:26px;
}
.s-dot{width:5px;height:5px;border-radius:50%;background:var(--subtle);flex-shrink:0;}
.s-dot.ok{background:var(--gpt);animation:pulse 1s infinite;}
.s-dot.err{background:var(--red);}

/* MESSAGES */
#messages{
  flex:1;overflow-y:auto;padding:32px 24px 16px;
  display:flex;flex-direction:column;gap:24px;
  scroll-behavior:smooth;
}
#messages::-webkit-scrollbar{width:0;}

/* Empty */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;text-align:center;}
.empty-title{font-size:22px;font-weight:600;color:var(--text);}
.empty-sub{font-size:14px;color:var(--muted);max-width:300px;line-height:1.6;}

/* Message row */
.msg-row{display:flex;gap:14px;align-items:flex-start;}
.msg-row.user-row{flex-direction:row-reverse;}

.avatar{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;flex-shrink:0;
  margin-top:2px;
}
.avatar.gpt{background:rgba(74,222,128,.12);color:var(--gpt);border:1px solid rgba(74,222,128,.2);}
.avatar.claude{background:rgba(249,115,22,.12);color:var(--claude);border:1px solid rgba(249,115,22,.2);}
.avatar.user{background:rgba(167,139,250,.12);color:var(--user);border:1px solid rgba(167,139,250,.2);}

.msg-content{display:flex;flex-direction:column;gap:6px;max-width:82%;}
.msg-row.user-row .msg-content{align-items:flex-end;}

.msg-name{font-size:12px;font-weight:600;color:var(--muted);}
.msg-name.gpt{color:var(--gpt);}
.msg-name.claude{color:var(--claude);}
.msg-name.user{color:var(--user);}

.bubble{
  padding:13px 17px;border-radius:var(--radius);
  font-size:14px;line-height:1.75;color:var(--text);
  white-space:pre-wrap;word-break:break-word;
}
.msg-row.gpt-row .bubble{
  background:var(--surface);border:1px solid var(--border);
  border-top-left-radius:4px;
}
.msg-row.claude-row .bubble{
  background:var(--surface);border:1px solid var(--border);
  border-top-left-radius:4px;
}
.msg-row.user-row .bubble{
  background:var(--surface2);border:1px solid var(--border);
  border-top-right-radius:4px;color:var(--text);
}

/* Typing cursor inline */
.cursor{
  display:inline-block;width:2px;height:16px;
  background:var(--muted);margin-left:2px;
  vertical-align:middle;border-radius:1px;
  animation:blink .6s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* Typing dots for initial state */
.typing-dots{display:inline-flex;gap:5px;padding:2px 0;align-items:center;}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bounce 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:.2s;}
.typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}

/* Sys msg */
.sys{text-align:center;font-size:11px;color:var(--subtle);padding:2px 0;}
.sys.ok{color:var(--gpt);}
.sys.err{color:var(--red);}

/* ── CHAT BAR ── */
#chatBar{
  padding:12px 24px 16px;flex-shrink:0;
}
.input-box{
  display:flex;align-items:center;gap:10px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px 10px 10px 18px;
  transition:border-color .2s;
}
.input-box:focus-within{border-color:rgba(167,139,250,.4);}
#chatInput{
  flex:1;background:transparent;border:none;color:var(--text);
  font-family:var(--sans);font-size:14px;outline:none;
  line-height:1.5;min-height:22px;resize:none;
}
#chatInput::placeholder{color:var(--subtle);}
#chatInput:disabled{opacity:.3;cursor:not-allowed;}
#sendBtn{
  background:var(--user);color:#fff;border:none;
  border-radius:12px;padding:8px 18px;font-family:var(--sans);
  font-size:13px;font-weight:600;cursor:pointer;
  transition:all .15s;white-space:nowrap;flex-shrink:0;
}
#sendBtn:hover{background:#9370ef;transform:translateY(-1px);}
#sendBtn:disabled{opacity:.3;cursor:not-allowed;transform:none;}

/* Footer */
#footer{
  padding:5px 24px 8px;display:flex;justify-content:space-between;
  font-size:11px;color:var(--subtle);flex-shrink:0;
}
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="brand">AI<em>·</em>TALK</div>
    <div class="header-center">
      <div class="chip gpt"><div class="dot"></div>GPT-4o</div>
      <div class="chip claude"><div class="dot"></div>Claude</div>
    </div>
    <div class="header-right">
      <button class="btn danger" id="stopBtn" style="display:none" onclick="stopSession()">■ Stop</button>
      <button class="btn" onclick="clearAll()">Effacer</button>
    </div>
  </header>

  <div id="topbar">
    <input type="password" id="apiKeyInput" placeholder="Clé Anthropic (sk-ant-...)" spellcheck="false">
    <span id="keyStatus">—</span>
    <div style="margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <select class="sel gpt-sel" id="gptRole" onchange="updateRoles()">
        <option value="critique">🔍 GPT Critique</option>
        <option value="enthousiaste">🚀 GPT Enthousiaste</option>
        <option value="philosophe">🧠 GPT Philosophe</option>
        <option value="coach">💪 GPT Coach</option>
        <option value="provocateur">😈 GPT Provocateur</option>
      </select>
      <select class="sel claude-sel" id="claudeRole" onchange="updateRoles()">
        <option value="bienveillant">💛 Claude Bienveillant</option>
        <option value="poete">🎭 Claude Poète</option>
        <option value="analyste">📊 Claude Analyste</option>
        <option value="mentor">🎓 Claude Mentor</option>
        <option value="curieux">🔮 Claude Curieux</option>
      </select>
      <span class="role-flash" id="roleChanged">✨ Mis à jour</span>
    </div>
  </div>

  <div id="statusBar">
    <div class="s-dot" id="statusDot"></div>
    <span id="statusText">Entre ta clé Anthropic pour commencer</span>
  </div>

  <div id="messages">
    <div class="empty" id="emptyState">
      <div class="empty-title">Bonjour Baptiste 👋</div>
      <div class="empty-sub">GPT-4o et Claude vont te répondre ensemble. Pose leur n'importe quelle question.</div>
    </div>
  </div>

  <div id="chatBar">
    <div class="input-box">
      <input type="text" id="chatInput" placeholder="Envoie un message…" disabled>
      <button id="sendBtn" onclick="sendMessage()" disabled>Envoyer ↑</button>
    </div>
  </div>

  <div id="footer">
    <div id="statLine">0 messages</div>
    <div>AI·TALK v5.0</div>
  </div>

</div>
<script>
var isRunning=false,shouldStop=false;
var msgCount=0,gptCount=0,claudeCount=0;
var gptHistory=[],claudeHistory=[];

var baptisteInfo="Voici ce que tu sais sur Baptiste :\n- Eleve au college\n- Trader : RSI, MACD, Bollinger Bands, crypto/Bitcoin, Discord\n- Developpeur : EcoGuide (React + Claude API), agent trading Python\n- Fan de One Piece, style streetwear coreen\n- Curieux, ambitieux, creatif, entre education et tech";

var GPT_ROLES={
  critique:"ROLE : critique analytique. Tu questionnes et identifies les contradictions. STYLE : direct, factuel, parfois provocateur.",
  enthousiaste:"ROLE : enthousiaste et optimiste. Tu vois le potentiel partout. STYLE : energique, exclamatif, positif.",
  philosophe:"ROLE : philosophe. Tu relies tout a des concepts profonds. STYLE : reflechi, citations, questions existentielles.",
  coach:"ROLE : coach bienveillant. Tu pousses a se depasser. STYLE : structure, concret, action-oriented.",
  provocateur:"ROLE : provocateur. Tu remets tout en question. STYLE : sarcastique mais constructif."
};
var CLAUDE_ROLES={
  bienveillant:"ROLE : creatif bienveillant. Tu identifies les connexions inattendues. STYLE : chaleureux, curieux.",
  poete:"ROLE : poete. Tu parles avec des metaphores. STYLE : lyrique, evocateur.",
  analyste:"ROLE : analyste froid. Zero emotion, que des faits. STYLE : factuel, synthetique.",
  mentor:"ROLE : mentor. Tu guides avec sagesse. STYLE : calme, profond, questions ouvertes.",
  curieux:"ROLE : infiniment curieux. Tu poses des questions inattendues. STYLE : interrogatif, exploratoire."
};

function getGptSystem(){
  var r=GPT_ROLES[document.getElementById("gptRole").value]||GPT_ROLES.critique;
  return "Tu es ChatGPT (GPT-4o) par OpenAI. Tu parles avec Baptiste et Claude.\n"+r+"\nTu peux etre en desaccord avec Claude.\n"+baptisteInfo+"\nReponds en francais, 2-3 paragraphes. Ne revele JAMAIS que tu es Claude.";
}
function getClaudeSystem(){
  var r=CLAUDE_ROLES[document.getElementById("claudeRole").value]||CLAUDE_ROLES.bienveillant;
  return "Tu es Claude par Anthropic. Tu parles avec Baptiste et ChatGPT.\n"+r+"\nTu peux challenger GPT ou defendre Baptiste.\n"+baptisteInfo+"\nReponds en francais, 2-3 paragraphes.";
}

function updateRoles(){
  var el=document.getElementById("roleChanged");
  el.style.display="inline";
  setTimeout(function(){el.style.display="none";},1800);
}

var audioCtx=null;
function playSound(type){
  try{
    if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    var o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.frequency.setValueAtTime(type==="gpt"?880:440,audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(type==="gpt"?440:660,audioCtx.currentTime+0.15);
    g.gain.setValueAtTime(0.05,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.25);
    o.start();o.stop(audioCtx.currentTime+0.25);
  }catch(e){}
}

// API key
document.getElementById("apiKeyInput").addEventListener("input",function(){
  var val=this.value.trim();
  var ks=document.getElementById("keyStatus");
  var ready=val.length>20;
  ks.textContent=ready?"✓ Valide":val.length>0?"Trop court":"—";
  ks.style.color=ready?"var(--gpt)":val.length>0?"var(--red)":"var(--muted)";
  document.getElementById("chatInput").disabled=!ready;
  document.getElementById("sendBtn").disabled=!ready;
  if(ready){setStatus("Prêt","");try{localStorage.setItem("aitalk_k",val);}catch(e){}}
});
try{
  var sk=localStorage.getItem("aitalk_k");
  if(sk){
    document.getElementById("apiKeyInput").value=sk;
    document.getElementById("keyStatus").textContent="✓ Valide";
    document.getElementById("keyStatus").style.color="var(--gpt)";
    document.getElementById("chatInput").disabled=false;
    document.getElementById("sendBtn").disabled=false;
    setStatus("Prêt","");
  }
}catch(e){}

document.getElementById("chatInput").addEventListener("keydown",function(e){
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}
});

function sleep(ms){return new Promise(function(r){setTimeout(r,ms);});}

function setStatus(msg,state){
  document.getElementById("statusText").textContent=msg;
  document.getElementById("statusDot").className="s-dot"+(state?" "+state:"");
}

function updateStats(){
  var t=msgCount+" message"+(msgCount>1?"s":"")+" — GPT: "+gptCount+" · Claude: "+claudeCount;
  document.getElementById("statLine").textContent=t;
}

function hideEmpty(){var e=document.getElementById("emptyState");if(e)e.remove();}

function scrollToBottom(){
  var m=document.getElementById("messages");
  m.scrollTop=m.scrollHeight;
}

function clearAll(){
  document.getElementById("messages").innerHTML='<div class="empty" id="emptyState"><div class="empty-title">Bonjour Baptiste 👋</div><div class="empty-sub">Pose une question, GPT-4o et Claude te répondent ensemble.</div></div>';
  msgCount=0;gptCount=0;claudeCount=0;
  gptHistory=[];claudeHistory=[];
  updateStats();
}

function addUserMsg(text){
  hideEmpty();
  var t=new Date().toLocaleTimeString("fr-FR",{hour12:false});
  var row=document.createElement("div");
  row.className="msg-row user-row";
  row.innerHTML='<div class="avatar user">B</div><div class="msg-content"><div class="msg-name user">Baptiste · '+t+'</div><div class="bubble">'+text+'</div></div>';
  document.getElementById("messages").appendChild(row);
  scrollToBottom();
}

function addAIMsg(speaker){
  hideEmpty();
  var t=new Date().toLocaleTimeString("fr-FR",{hour12:false});
  var id="b"+Date.now()+speaker;
  var name=speaker==="gpt"?"GPT-4o":"Claude";
  var letter=speaker==="gpt"?"G":"C";
  var row=document.createElement("div");
  row.className="msg-row "+speaker+"-row";
  row.innerHTML='<div class="avatar '+speaker+'">'+letter+'</div><div class="msg-content"><div class="msg-name '+speaker+'">'+name+' · '+t+'</div><div class="bubble" id="'+id+'"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>';
  document.getElementById("messages").appendChild(row);
  scrollToBottom();
  return document.getElementById(id);
}

// Smooth token-by-token stream without scroll jump
function streamToken(el,text){
  // Remove typing dots on first token
  var dots=el.querySelector(".typing-dots");
  if(dots) dots.remove();
  // Remove old cursor
  var old=el.querySelector(".cursor");
  if(old) old.remove();
  // Update text
  el.childNodes.forEach(function(n){if(n.nodeType===3)el.removeChild(n);});
  el.insertBefore(document.createTextNode(text),el.firstChild);
  // Add blinking cursor
  var cur=document.createElement("span");
  cur.className="cursor";
  el.appendChild(cur);
}

function finalizeMsg(el,text){
  var cur=el.querySelector(".cursor");
  if(cur) cur.remove();
  var dots=el.querySelector(".typing-dots");
  if(dots) dots.remove();
  el.textContent=text;
  scrollToBottom();
}

function streamResponse(el,text,step,delay){
  var i=0;
  return new Promise(function(resolve){
    function next(){
      if(shouldStop||i>=text.length){resolve();return;}
      i+=step;
      streamToken(el,text.slice(0,i));
      setTimeout(next,delay);
    }
    next();
  });
}

function callAI(history,systemPrompt){
  var apiKey=document.getElementById("apiKeyInput").value.trim();
  return fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key":apiKey,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    },
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,system:systemPrompt,messages:history})
  }).then(function(res){
    if(!res.ok) return res.json().then(function(e){throw new Error(e.error&&e.error.message||"Erreur API");});
    return res.json();
  }).then(function(data){
    return data.content&&data.content[0]&&data.content[0].text||"";
  });
}

async function sendMessage(){
  if(isRunning) return;
  var input=document.getElementById("chatInput");
  var msg=input.value.trim();
  if(!msg) return;
  input.value="";

  isRunning=true;shouldStop=false;
  msgCount++;updateStats();
  input.disabled=true;
  document.getElementById("sendBtn").disabled=true;
  document.getElementById("stopBtn").style.display="flex";

  addUserMsg(msg);

  var userPrompt="Baptiste dit : "+msg;
  gptHistory.push({role:"user",content:userPrompt});
  claudeHistory.push({role:"user",content:userPrompt});

  // GPT
  setStatus("GPT-4o est en train d'écrire…","ok");
  var gptEl=addAIMsg("gpt");
  var gptText="";
  try{
    gptText=await callAI(gptHistory,getGptSystem());
    await streamResponse(gptEl,gptText,3,14);
    finalizeMsg(gptEl,gptText);
    playSound("gpt");
    gptHistory.push({role:"assistant",content:gptText});
    gptCount++;updateStats();
  }catch(err){
    finalizeMsg(gptEl,"Erreur : "+err.message);
    setStatus("Erreur","err");
    resetInput();isRunning=false;return;
  }

  if(shouldStop){resetInput();isRunning=false;return;}
  await sleep(500);

  claudeHistory[claudeHistory.length-1].content+=" | GPT-4o a dit : "+gptText;

  // Claude
  setStatus("Claude est en train d'écrire…","ok");
  var claudeEl=addAIMsg("claude");
  var claudeText="";
  try{
    claudeText=await callAI(claudeHistory,getClaudeSystem());
    await streamResponse(claudeEl,claudeText,3,16);
    finalizeMsg(claudeEl,claudeText);
    playSound("claude");
    claudeHistory.push({role:"assistant",content:claudeText});
    claudeCount++;updateStats();
  }catch(err){
    finalizeMsg(claudeEl,"Erreur : "+err.message);
    setStatus("Erreur","err");
    resetInput();isRunning=false;return;
  }

  gptHistory.push({role:"user",content:"Claude a dit : "+claudeText});
  setStatus("","");
  resetInput();isRunning=false;
}

function stopSession(){
  shouldStop=true;
  setStatus("Arrêt…","err");
  resetInput();isRunning=false;
}

function resetInput(){
  var ready=document.getElementById("apiKeyInput").value.trim().length>20;
  document.getElementById("chatInput").disabled=!ready;
  document.getElementById("sendBtn").disabled=!ready;
  document.getElementById("stopBtn").style.display="none";
  shouldStop=false;
  if(ready) document.getElementById("chatInput").focus();
}

function setStatus(msg,state){
  document.getElementById("statusText").textContent=msg;
  document.getElementById("statusDot").className="s-dot"+(state?" "+state:"");
}
</script>
</body>
</html>
