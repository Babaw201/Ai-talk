<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Double Mind — Redirection</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(90, 168, 255, 0.16), transparent 28%),
        radial-gradient(circle at top right, rgba(255, 155, 69, 0.12), transparent 28%),
        linear-gradient(180deg, #07101c 0%, #03050a 100%);
      color: #edf3ff;
      font-family: Inter, Arial, sans-serif;
      text-align: center;
      padding: 24px;
    }

    .box {
      max-width: 520px;
      padding: 28px;
      border-radius: 22px;
      background: rgba(10, 14, 24, 0.92);
      border: 1px solid rgba(109, 140, 197, 0.22);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 24px;
    }

    p {
      color: #8c9bb8;
      line-height: 1.6;
    }

    a {
      color: #5aa8ff;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Redirection Double Mind...</h1>
    <p>Si rien ne se passe, <a href="/">retourne à l’accueil</a>.</p>
  </div>

  <script>
    const path = window.location.pathname.replace(/\/+$/, "");
    const search = window.location.search || "";

    // /app ou /app/ -> /app.html
    if (path === "/app") {
      window.location.replace("/app.html");
    }

    // /share -> /share.html
    else if (path === "/share") {
      window.location.replace("/share.html" + search);
    }

    // /share/abc123 -> /share.html?shareId=abc123
    else if (path.startsWith("/share/")) {
      const parts = path.split("/").filter(Boolean);
      const shareId = parts[1] || "";

      if (shareId) {
        window.location.replace("/share.html?shareId=" + encodeURIComponent(shareId));
      } else {
        window.location.replace("/share.html");
      }
    }

    // Si aucune route ne correspond
    else {
      setTimeout(() => {
        window.location.replace("/");
      }, 1200);
    }
  </script>
</body>
</html>
