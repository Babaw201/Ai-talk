<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Double Mind — Conversation partagée</title>
  <meta property="og:title" content="Double Mind — GPT vs Claude" />
  <meta property="og:description" content="Découvrez cette conversation entre GPT et Claude sur Double Mind." />
  <meta property="og:site_name" content="Double Mind" />
  <link rel="icon" type="image/png" href="logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #05070d;
      --panel: rgba(10, 14, 24, 0.94);
      --border: rgba(109, 140, 197, 0.16);
      --border-strong: rgba(109, 140, 197, 0.28);
      --white: #edf3ff;
      --muted: #8c9bb8;
      --muted-2: #6b7892;
      --blue: #5aa8ff;
      --blue-bg: rgba(24, 66, 130, 0.18);
      --orange: #ff9b45;
      --orange-bg: rgba(118, 54, 4, 0.22);
      --green: #39d98a;
      --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.22);
      --shadow-blue: 0 0 0 1px rgba(90, 168, 255, 0.08), 0 14px 34px rgba(18, 52, 112, 0.18);
      --shadow-orange: 0 0 0 1px rgba(255, 155, 69, 0.08), 0 14px 34px rgba(118, 54, 4, 0.18);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: radial-gradient(circle at top left, rgba(43, 94, 193, 0.13), transparent 28%),
        radial-gradient(circle at top right, rgba(255, 122, 26, 0.09), transparent 22%),
        linear-gradient(180deg, #07101c 0%, #04070c 48%, #03050a 100%);
      color: var(--white);
      font-family: "Inter", sans-serif;
    }

    body::before {
      content: "";
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,0.015) 3px, rgba(255,255,255,0.015) 4px);
      pointer-events: none; z-index: 9999; opacity: 0.22;
    }

    header {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 12px 20px;
      background: linear-gradient(180deg, rgba(7, 12, 22, 0.96), rgba(7, 12, 22, 0.78));
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 10;
    }

    .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .brand-logo { width: 36px; height: 36px; border-radius: 11px; object-fit: cover; flex-shrink: 0; }
    .brand-title { font-family: "Orbitron", sans-serif; font-size: 19px; font-weight: 900; letter-spacing: 1px; }
    .brand-title .blue { color: var(--blue); }
    .brand-title .orange { color: var(--orange); }

    .header-cta {
      background: linear-gradient(180deg, #69b4ff, #4f88ff);
      color: #08111f; font-size: 13px; font-weight: 800;
      padding: 10px 16px; border-radius: 12px; border: 0;
      cursor: pointer; text-decoration: none; display: inline-block;
      box-shadow: var(--shadow-blue);
    }

    main { max-width: 760px; margin: 0 auto; padding: 24px 16px 60px; }

    .share-badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 7px 13px; border-radius: 999px;
      border: 1px solid rgba(57,217,138,0.25);
      background: rgba(57,217,138,0.07);
      color: var(--green); font-size: 12px; font-weight: 700;
      margin-bottom: 16px;
    }

    .share-title {
      font-size: 22px; font-weight: 800; margin-bottom: 6px;
      line-height: 1.3; letter-spacing: -0.4px;
    }

    .share-meta {
      color: var(--muted); font-size: 13px; margin-bottom: 24px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }

    .meta-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 999px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      font-size: 12px; color: var(--muted);
    }

    .messages-wrap { display: flex; flex-direction: column; gap: 14px; }

    .msg { display: flex; gap: 10px; max-width: 88%; animation: fadeIn 0.22s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .msg.user-msg, .msg.gpt { align-self: flex-end; flex-direction: row-reverse; }
    .msg.claude { align-self: flex-start; }
    .msg.system { align-self: center; max-width: 100%; }

    .avatar { width: 34px; height: 34px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; letter-spacing: 1px; flex-shrink: 0; margin-top: 18px; }
    .user-av { background: rgba(130,130,255,0.08); color: #cfd3ff; border: 1px solid rgba(130,130,255,0.18); }
    .gpt-av { background: var(--blue-bg); color: #b9d8ff; border: 1px solid rgba(90,168,255,0.2); }
    .claude-av { background: var(--orange-bg); color: #ffd4ab; border: 1px solid rgba(255,155,69,0.22); }

    .msg-body { min-width: 0; }
    .sender-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 5px; color: var(--muted); }
    .gpt .sender-label { text-align: right; color: var(--blue); }
    .claude .sender-label { color: var(--orange); }
    .user-msg .sender-label { text-align: right; color: #c4c9ff; }

    .bubble { border-radius: 17px; padding: 13px 15px; font-size: 14px; line-height: 1.7; word-break: break-word; white-space: pre-wrap; }
    .user-msg .bubble { background: linear-gradient(180deg, rgba(39,48,85,0.7), rgba(22,29,55,0.92)); border: 1px solid rgba(132,146,240,0.18); color: #e6eaff; }
    .gpt .bubble { background: linear-gradient(180deg, rgba(20,52,105,0.34), rgba(12,28,56,0.92)); border: 1px solid rgba(90,168,255,0.18); color: #dcecff; box-shadow: var(--shadow-blue); }
    .claude .bubble { background: linear-gradient(180deg, rgba(94,43,0,0.24), rgba(48,22,2,0.95)); border: 1px solid rgba(255,155,69,0.18); color: #ffe2c0; box-shadow: var(--shadow-orange); }
    .system .bubble { text-align: center; padding: 9px 14px; border-radius: 999px; background: rgba(255,255,255,0.02); border: 1px dashed var(--border); color: var(--muted); font-size: 12px; }

    .cta-bottom {
      margin-top: 36px; padding: 22px 20px; border-radius: 20px;
      background: linear-gradient(180deg, rgba(12,18,32,0.92), rgba(8,12,22,0.96));
      border: 1px solid var(--border-strong); text-align: center;
    }
    .cta-bottom p { color: var(--muted); font-size: 14px; margin-bottom: 14px; line-height: 1.6; }
    .cta-bottom a {
      display: inline-block;
      background: linear-gradient(180deg, #69b4ff, #4f88ff);
      color: #08111f; font-size: 14px; font-weight: 800;
      padding: 13px 24px; border-radius: 14px; text-decoration: none;
      box-shadow: var(--shadow-blue);
    }

    #loading { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 15px; }
    #error-box { text-align: center; padding: 60px 20px; }
    #error-box h2 { font-size: 20px; margin-bottom: 10px; color: #ff5c7a; }
    #error-box p { color: var(--muted); font-size: 14px; }

    @media (max-width: 600px) {
      main { padding: 16px 10px 50px; }
      .share-title { font-size: 18px; }
      .msg { max-width: 100%; gap: 6px; }
      .avatar { width: 28px; height: 28px; border-radius: 9px; font-size: 8px; }
      .bubble { font-size: 13px; padding: 11px 12px; border-radius: 14px; }
    }
  </style>
</head>
<body>

  <header>
    <a class="brand" href="/">
      <img src="logo.png" class="brand-logo" alt="Double Mind" onerror="this.style.display='none'">
      <div class="brand-title"><span class="blue">Double</span> <span class="orange">Mind</span></div>
    </a>
    <a class="header-cta" href="/">Essayer Double Mind →</a>
  </header>

  <main>
    <div id="loading">⏳ Chargement de la conversation...</div>
    <div id="error-box" style="display:none;">
      <h2>⚠ Conversation introuvable</h2>
      <p>Ce lien est invalide ou a expiré.</p>
    </div>
    <div id="content" style="display:none;">
      <div class="share-badge">🔗 Conversation partagée</div>
      <div class="share-title" id="conv-title">Conversation</div>
      <div class="share-meta">
        <span class="meta-pill" id="conv-mode">—</span>
        <span class="meta-pill" id="conv-date">—</span>
      </div>
      <div class="messages-wrap" id="messages-wrap"></div>
      <div class="cta-bottom">
        <p>Tu veux comparer GPT et Claude sur tes propres questions ?</p>
        <a href="/">Essayer Double Mind gratuitement →</a>
      </div>
    </div>
  </main>

  <script>
    const WORKER = "https://ai-talk-proxy.baptiste-werner.workers.dev";

    function esc(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

  function getShareId() {
  const url = new URL(window.location.href);

  // 1) Cas /share/abc123
  const path = url.pathname.replace(/\/+$/, "");
  const parts = path.split("/").filter(Boolean);

  if (parts.length >= 2 && parts[0] === "share") {
    return decodeURIComponent(parts[1]).trim();
  }

  // 2) Cas /share.html?shareId=abc123
  const fromQuery = url.searchParams.get("shareId");
  if (fromQuery && fromQuery.trim()) {
    return fromQuery.trim();
  }

  // 3) Compat ancien format ?share=abc123
  const legacy = url.searchParams.get("share");
  if (legacy && legacy.trim()) {
    return legacy.trim();
  }

  return "";
}

    function addMsg(wrap, type, labelText, avClass, avText, text) {
      const d = document.createElement("div");
      d.className = "msg " + type;
      if (type === "system") {
        d.innerHTML = `<div class="bubble">${esc(text)}</div>`;
      } else {
        d.innerHTML = `
          <div class="avatar ${avClass}">${avText}</div>
          <div class="msg-body">
            <div class="sender-label">${labelText}</div>
            <div class="bubble">${esc(text)}</div>
          </div>`;
      }
      wrap.appendChild(d);
    }

    async function loadShare() {
      const shareId = getShareId();
      console.log("PATHNAME =", window.location.pathname);
console.log("SEARCH =", window.location.search);
console.log("SHARE ID =", shareId);
      
        if (!shareId) {
        document.getElementById("loading").style.display = "none";
        document.getElementById("error-box").style.display = "block";
        return;
      }

      try {
        const res = await fetch(WORKER + "/public-conversation", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ shareId })
        });
        const data = await res.json();

        document.getElementById("loading").style.display = "none";

        if (!data.success || !data.conversation) {
          document.getElementById("error-box").style.display = "block";
          return;
        }

        const conv = data.conversation;
        const msgs = data.messages || [];

        // Titre et meta
        document.title = "Double Mind — " + (conv.title || "Conversation partagée");
        document.getElementById("conv-title").textContent = conv.title || "Conversation partagée";

        const modeLabels = { classic: "🔵 Classique", debate: "⚔️ Débat", expert: "🧠 Expert", creative: "🎨 Créatif", clash: "🔥 Clash" };
        document.getElementById("conv-mode").textContent = modeLabels[conv.mode] || conv.mode || "Classique";

        const date = new Date(conv.created_at).toLocaleDateString("fr-FR", { day: "2-digit", month: "long", year: "numeric" });
        document.getElementById("conv-date").textContent = "📅 " + date;

        // Messages
        const wrap = document.getElementById("messages-wrap");
        msgs.forEach(msg => {
          if (msg.role === "user") {
            addMsg(wrap, "user-msg", "Vous", "user-av", "YOU", msg.content);
          } else if (msg.role === "assistant" && msg.ai === "gpt") {
            addMsg(wrap, "gpt", "GPT-4o", "gpt-av", "GPT", msg.content);
          } else if (msg.role === "assistant" && msg.ai === "claude") {
            addMsg(wrap, "claude", "Claude", "claude-av", "CLD", msg.content);
          }
        });

        document.getElementById("content").style.display = "block";

      } catch (e) {
        document.getElementById("loading").style.display = "none";
        document.getElementById("error-box").style.display = "block";
      }
    }

    loadShare();
  </script>
</body>
</html>
